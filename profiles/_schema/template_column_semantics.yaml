  - vendor: "Endress+Hauser"
    doc_type: "Datasheet"
    mappings:
      - vendor_field: "Nominal Diameter"
        canonical_column: "nominal_diameter"
        sheet: "Process_Attributes"
      - vendor_field: "Nominal Pressure"
        canonical_column: "nominal_pressure"
        sheet: "Process_Attributes"
      - vendor_field: "Model / Type"
        canonical_column: "Model"
        sheet: "Device_ID"
      - vendor_field: "Measuring Range"
        canonical_column: "measurement_range"
        sheet: "Process_Attributes"
      - vendor_field: "Process Connection"
        canonical_column: "connection_size"
