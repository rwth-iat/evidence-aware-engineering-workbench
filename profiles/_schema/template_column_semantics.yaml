        canonical_column: "nominal_diameter"
        sheet: "Process_Attributes"
      - vendor_field: "Nenndruck"
        canonical_column: "nominal_pressure"
        sheet: "Process_Attributes"
      - vendor_field: "PN"
        canonical_column: "nominal_pressure"
        sheet: "Process_Attributes"
      - vendor_field: "Typ"
        canonical_column: "Model"
        sheet: "Device_ID"
      - vendor_field: "Kvs-Wert"
        canonical_column: "flow_coefficient_kv"
        sheet: "Process_Attributes"
      - vendor_field: "Max. Betriebstemperatur"
