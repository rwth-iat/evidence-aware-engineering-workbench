    irdi: "0112/2///61987#ABA300#005"
    source: "IEC_CDD"
    note: "IEC 61987: code of product — unique combination of numbers and letters used to identify the device."
  DeviceId:
    irdi: "0112/2///61987#ABA292#006"
    source: "IEC_CDD"
    note: "IEC 61987: name of component manufacturer — used as device instance identifier."
  hasInstrumentationLoopFunctionNumber:
    irdi: "http://sandbox.dexpi.org/rdl/InstrumentationLoopFunction"
    source: "DEXPI_RDL"
    note: "DEXPI 2.0: InstrumentationLoopFunction. An identified collection of related PROCESS CONTROL REQUIREMENTs."
  ProcessInstrumentationFunctionNumber:
    irdi: "http://sandbox.dexpi.org/rdl/ProcessInstrumentationFunction"
    source: "DEXPI_RDL"
    note: "DEXPI 2.0 NE 159: ProcessInstrumentationFunction. A requirement for instrumentation and/or control structures."
  ProcessInstrumentationFunctionCategory:
    irdi: "http://sandbox.dexpi.org/rdl/ProcessInstrumentationFunction"
    source: "DEXPI_RDL"
    note: "DEXPI 2.0: ProcessInstrumentationFunction category (IEC 81346-1 function letters)."
  ProcessInstrumentationFunctionModifier:
    irdi: "http://sandbox.dexpi.org/rdl/ProcessInstrumentationFunction"
    source: "DEXPI_RDL"
    note: "DEXPI 2.0: ProcessInstrumentationFunction modifier (e.g., T41, Y30)."
  ProcessInstrumentationFunctions:
    irdi: "http://sandbox.dexpi.org/rdl/ProcessInstrumentationFunction"
    source: "DEXPI_RDL"
    note: "DEXPI 2.0: Aggregated function description."
  ContextSummary:
    irdi: "urn:ievpi:semantic:ContextSummary"
    source: "IEV4PI_CUSTOM"
    note: "Human-readable context summary of the device in the plant. IEV4PI-specific."
  XSDStatus:
    irdi: "urn:ievpi:semantic:XSDStatus"
    source: "IEV4PI_CUSTOM"
    note: "DEXPI XSD validation status (present/missing/conflict). IEV4PI-specific."

