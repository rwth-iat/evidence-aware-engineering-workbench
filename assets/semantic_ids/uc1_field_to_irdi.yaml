# UC1 Field → IRDI / Semantic ID Mapping
# ==========================================
# Maps every AAS Submodel Property to a standard IRDI (ECLASS, IEC 61987 CDD,
# or IDTA) for semanticId injection into generated AAS files.
#
# Sources:
#   - ECLASS 14.0/15.0 (0173-1#02-...) — verified via eclass.eu content search
#   - IEC 61987 CDD (0112/2///61987#...) — verified via cdd.iec.ch public database
#   - IDTA Nameplate V1.0 (0112/2///61987#ABA000)
#   - DEXPI 2.0 RDL — verified via https://sandbox.dexpi.org/rdl/
#   - PCA RDL (ISO 15926) — verified via http://data.posccaesar.org/rdl/
#   - IEV4PI-custom — research-specific concepts; marked CUSTOM
#
# CUSTOM markers indicate IEV4PI-specific concepts with no public standard IRDI.
#
# Format:
#   <SubmodelName>:
#     <PropertyName>:
#       irdi: "<standard IRDI>"
#       source: "<ECLASS | IEC_CDD | IDTA | DEXPI_RDL | IEV4PI_CUSTOM>"
# ==========================================

SM_CoreIdentity:
